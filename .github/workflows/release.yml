name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish"
        required: true
        type: string

permissions:
  contents: write

env:
  HOMEBREW_TAP_REPOSITORY: lucataco/homebrew-tap

jobs:
  release:
    name: Build, sign, notarize, and publish
    runs-on: macos-latest

    steps:
      - name: Check out source (tag push)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check out source (manual publish)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/tags/${{ github.event.inputs.tag }}

      - name: Select Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: ./scripts/generate-xcodeproj.sh

      - name: Resolve tag and version
        id: vars
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag '$TAG' does not exist in this checkout" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate signing secrets
        id: signing
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          for var in CERTIFICATE_P12 CERTIFICATE_PASSWORD APPLE_API_KEY_ID APPLE_API_ISSUER_ID APPLE_API_KEY_BASE64; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var" >&2
              exit 1
            fi
          done
          echo "codesign_identity=Developer ID Application: Luis Catacora (LPW32R55UN)" >> "$GITHUB_OUTPUT"

      - name: Resolve Homebrew tap sync mode
        id: tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$HOMEBREW_TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare signing keychain
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/hiddenapp-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/hiddenapp-build.keychain-db"
          # Generate a random keychain password — no need for a secret.
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v "$KEYCHAIN_PATH"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          API_KEY_DIR="$RUNNER_TEMP/private_keys"
          mkdir -p "$API_KEY_DIR"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$API_KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Build and archive (Release)
        env:
          CODESIGN_IDENTITY: ${{ steps.signing.outputs.codesign_identity }}
        run: |
          xcodebuild \
            -project hiddenapp.xcodeproj \
            -scheme hiddenapp \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="$CODESIGN_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=LPW32R55UN \
            archive \
            -archivePath "$RUNNER_TEMP/hiddenapp.xcarchive"

      - name: Export app from archive
        env:
          CODESIGN_IDENTITY: ${{ steps.signing.outputs.codesign_identity }}
        run: |
          mkdir -p "$RUNNER_TEMP/Export"
          /usr/libexec/PlistBuddy -c 'Add :method string developer-id' \
            -c 'Add :teamID string LPW32R55UN' \
            "$RUNNER_TEMP/ExportOptions.plist"
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/hiddenapp.xcarchive" \
            -exportPath "$RUNNER_TEMP/Export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            CODE_SIGN_IDENTITY="$CODESIGN_IDENTITY" \
            DEVELOPMENT_TEAM=LPW32R55UN

      - name: Package, notarize, and staple
        id: package
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          APP_PATH="$RUNNER_TEMP/Export/hiddenapp.app"
          ZIP_NAME="HiddenApp-${VERSION}.zip"
          DIST_DIR="$RUNNER_TEMP/dist"
          mkdir -p "$DIST_DIR"
          ZIP_PATH="$DIST_DIR/$ZIP_NAME"

          printf '==> Verifying code signature...\n'
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          # spctl will reject the app until it's notarized; check again after stapling
          spctl -a -t exec -vv "$APP_PATH" || true

          printf '==> Creating release archive (pre-notarization)...\n'
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

          printf '==> Submitting for notarization...\n'
          xcrun notarytool submit "$ZIP_PATH" \
            --key "$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait

          printf '==> Stapling notarization ticket...\n'
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

          printf '==> Verifying Gatekeeper acceptance...\n'
          spctl -a -t exec -vv "$APP_PATH"

          printf '==> Repacking notarized and stapled app...\n'
          rm -f "$ZIP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

          SHA256="$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

          printf '==> Release artifact ready:\n'
          printf '  %s\n' "$ZIP_PATH"
          printf '  sha256: %s\n' "$SHA256"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.vars.outputs.tag }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading artifacts only."
          else
            gh release create "$TAG" \
              --verify-tag \
              --title "HiddenApp ${VERSION}" \
              --generate-notes
          fi

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.vars.outputs.tag }}
          ZIP_PATH: ${{ steps.package.outputs.zip_path }}
        run: |
          gh release upload "$TAG" "$ZIP_PATH" --clobber

      - name: Check out Homebrew tap
        if: steps.tap.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: .release/homebrew-tap

      - name: Update Homebrew tap
        if: steps.tap.outputs.enabled == 'true'
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          SHA256: ${{ steps.package.outputs.sha256 }}
        run: |
          python3 ./scripts/update_homebrew_cask.py \
            .release/homebrew-tap/Casks/hiddenapp.rb \
            "$VERSION" \
            "$SHA256"

      - name: Commit Homebrew tap update
        if: steps.tap.outputs.enabled == 'true'
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          if git -C .release/homebrew-tap diff --quiet; then
            echo "Homebrew tap already up to date"
            exit 0
          fi

          git -C .release/homebrew-tap config user.name "github-actions[bot]"
          git -C .release/homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C .release/homebrew-tap add Casks/hiddenapp.rb
          git -C .release/homebrew-tap commit -m "Update hiddenapp to v${VERSION}"
          git -C .release/homebrew-tap push

      - name: Warn when tap sync is disabled
        if: steps.tap.outputs.enabled != 'true'
        run: |
          echo "HOMEBREW_TAP_TOKEN is not configured, so the Homebrew tap was not updated."

      - name: Clean up signing keychain
        if: always()
        env:
          KEYCHAIN_PATH: ${{ runner.temp }}/hiddenapp-build.keychain-db
        run: |
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
